esphome:
  name: tublemetry
  friendly_name: "Tublemetry"

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  output_power: 20dB
  ap:
    ssid: "Tublemetry Fallback"
    password: !secret ota_password

captive_portal:

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

# External component -- local path to our component
external_components:
  - source:
      type: local
      path: components

# Synchronous clock+data display decoder
# VS300FL4 protocol: Pin 6 = clock (24 pulses/frame at 60Hz), Pin 5 = data
# Connect via RJ45 T-splitter. Voltage divider required (5V -> 3.3V).
#
# RJ45 wiring:
#   Pin 4 (Blue)       -> ESP32 GND
#   Pin 5 (Blue/White) -> voltage divider -> data_pin GPIO
#   Pin 6 (Green)      -> voltage divider -> clock_pin GPIO
#
# NOTE: Pull-downs prevent floating-pin noise from starving WiFi when
# the display cable is not connected.
tublemetry_display:
  id: hot_tub_display
  clock_pin:
    number: GPIO16
    mode:
      input: true
      pulldown: true
  data_pin:
    number: GPIO17
    mode:
      input: true
      pulldown: true

# Climate entity -- read-only thermostat card in HA
climate:
  - platform: tublemetry_display
    name: "Hot Tub"
    id: hot_tub
    tublemetry_id: hot_tub_display

# Diagnostic sensors
sensor:
  - platform: tublemetry_display
    tublemetry_id: hot_tub_display
    decode_confidence:
      name: "Hot Tub Decode Confidence"
      entity_category: "diagnostic"

text_sensor:
  - platform: tublemetry_display
    tublemetry_id: hot_tub_display
    display_string:
      name: "Hot Tub Display"
      entity_category: "diagnostic"
    raw_hex:
      name: "Hot Tub Raw Hex"
      entity_category: "diagnostic"
    display_state:
      name: "Hot Tub Display State"
      entity_category: "diagnostic"
    digit_values:
      name: "Hot Tub Digit Values"
      entity_category: "diagnostic"
    last_update:
      name: "Hot Tub Last Update"
      entity_category: "diagnostic"
