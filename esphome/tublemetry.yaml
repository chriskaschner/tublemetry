esphome:
  name: tublemetry
  friendly_name: "Tublemetry"
  on_boot:
    priority: 600
    then:
      - logger.log: "Tublemetry booted"

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: LIGHT
  # Auto-reboot if WiFi stays disconnected for 10 minutes
  reboot_timeout: 10min
  ap:
    ssid: "Tublemetry Fallback"
    password: !secret ota_password
  on_connect:
    - logger.log: "WiFi connected"
  on_disconnect:
    - logger.log:
        level: WARN
        format: "WiFi disconnected"

captive_portal:

logger:
  level: INFO

api:
  encryption:
    key: !secret api_key
  # Reboot if HA doesn't connect for 15 minutes (catches ghost connectivity)
  reboot_timeout: 15min

ota:
  - platform: esphome
    password: !secret ota_password

# Safe mode: after 10 consecutive boot failures, enter minimal WiFi+OTA mode
# A boot that survives 30s counts as successful
safe_mode:
  num_attempts: 10
  boot_is_good_after: 30s
  on_safe_mode:
    - logger.log:
        level: ERROR
        format: "SAFE MODE ACTIVE — OTA recovery only"

# --- Switches (relay hold for bench testing) ---
switch:
  - platform: template
    name: "Relay A Hold (Temp Up)"
    entity_category: diagnostic
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: digitalWrite(18, HIGH);
    turn_off_action:
      - lambda: digitalWrite(18, LOW);
  - platform: template
    name: "Relay B Hold (Temp Down)"
    entity_category: diagnostic
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: digitalWrite(19, HIGH);
    turn_off_action:
      - lambda: digitalWrite(19, LOW);

# --- Buttons (remote management + hardware test) ---
button:
  - platform: restart
    name: "Hot Tub Restart"
    entity_category: "diagnostic"
  - platform: safe_mode
    name: "Hot Tub Safe Mode"
    entity_category: "diagnostic"
  - platform: template
    name: "Hot Tub Temp Up (Test)"
    entity_category: "diagnostic"
    on_press:
      - lambda: id(hot_tub_display).test_press_up();
  - platform: template
    name: "Hot Tub Temp Down (Test)"
    entity_category: "diagnostic"
    on_press:
      - lambda: id(hot_tub_display).test_press_down();

# --- Binary Sensors ---
binary_sensor:
  - platform: status
    name: "Hot Tub API Status"
  - platform: tublemetry_display
    tublemetry_id: hot_tub_display
    heater:
      name: "Hot Tub Heater"
    pump:
      name: "Hot Tub Pump"
    light:
      name: "Hot Tub Light"

# --- Numeric Sensors ---
sensor:
  - platform: wifi_signal
    name: "Hot Tub WiFi Signal"
    update_interval: 60s
    entity_category: "diagnostic"
  - platform: uptime
    name: "Hot Tub Uptime"
    entity_category: "diagnostic"
  - platform: tublemetry_display
    tublemetry_id: hot_tub_display
    decode_confidence:
      name: "Hot Tub Decode Confidence"
      entity_category: "diagnostic"
    temperature:
      name: "Hot Tub Temperature"
      filters:
        - heartbeat: 30s
        - delta: 1.0
    detected_setpoint:
      name: "Hot Tub Detected Setpoint"
    retry_count:
      name: "Hot Tub Retry Count"
      entity_category: "diagnostic"

# --- Number Entities ---
number:
  - platform: tublemetry_display
    tublemetry_id: hot_tub_display
    setpoint:
      name: "Hot Tub Setpoint"
      mode: BOX

# --- Text Sensors ---
text_sensor:
  - platform: version
    name: "Hot Tub Firmware Version"
    entity_category: "diagnostic"
  - platform: wifi_info
    ip_address:
      name: "Hot Tub IP Address"
      entity_category: "diagnostic"
    ssid:
      name: "Hot Tub WiFi SSID"
      entity_category: "diagnostic"
    mac_address:
      name: "Hot Tub MAC Address"
      entity_category: "diagnostic"
  - platform: tublemetry_display
    tublemetry_id: hot_tub_display
    display_string:
      name: "Hot Tub Display"
      entity_category: "diagnostic"
    raw_hex:
      name: "Hot Tub Raw Hex"
      entity_category: "diagnostic"
    display_state:
      name: "Hot Tub Display State"
      entity_category: "diagnostic"
    digit_values:
      name: "Hot Tub Digit Values"
      entity_category: "diagnostic"
    last_update:
      name: "Hot Tub Last Update"
      entity_category: "diagnostic"
    version:
      name: "Hot Tub Component Version"
      entity_category: "diagnostic"
    last_command_result:
      name: "Hot Tub Last Command Result"
      entity_category: "diagnostic"
    injection_phase:
      name: "Hot Tub Injection Phase"
      entity_category: "diagnostic"

# --- External Component ---
external_components:
  - source:
      type: local
      path: components

# Synchronous clock+data display decoder
# VS300FL4 protocol: Pin 6 = clock (24 pulses/frame at 60Hz), Pin 5 = data
# Connect via RJ45 T-splitter. Voltage divider required (5V -> 3.3V).
#
# RJ45 wiring:
#   Pin 1 (Orange/White) -> 5V power input to ESP32 (via bulk caps)
#   Pin 4 (Blue)         -> ESP32 GND
#   Pin 5 (Blue/White)   -> voltage divider -> data_pin GPIO
#   Pin 6 (Green)        -> voltage divider -> clock_pin GPIO
#
# Power: ESP32 is powered directly from the tub's 5V rail (Pin 1).
# Bulk capacitors on the 5V input absorb WiFi TX current spikes (~300mA)
# so the Balboa board's regulator sees a smooth, low draw. Combined with
# wifi power_save_mode: LIGHT to minimize average consumption.
#
# Pull-downs prevent floating-pin noise when display cable is not connected.
tublemetry_display:
  id: hot_tub_display
  clock_pin:
    number: GPIO16
    mode:
      input: true
      pulldown: true
  data_pin:
    number: GPIO17
    mode:
      input: true
      pulldown: true
  # Button injection via AQY212EH photorelays
  # GPIO18 -> photorelay -> RJ45 pin 8 (Temp Down button line, Brown)
  # GPIO19 -> photorelay -> RJ45 pin 2 (Temp Up button line, Orange)
  # Omit these two lines for read-only mode (no physical button control).
  temp_up_pin: GPIO19
  temp_down_pin: GPIO18
  # Timing (defaults shown — adjust after real-hardware testing)
  # press_duration_ms: 200
  # inter_press_delay_ms: 300
  # verify_timeout_ms: 10000
  # cooldown_ms: 1000

