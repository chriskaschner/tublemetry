# Hot Tub Dashboard -- Lovelace YAML
#
# Paste each card separately into the Lovelace raw YAML editor:
# Edit Dashboard -> Add Card -> Manual (bottom of card picker list).

---
# Card 1: Temperature gauge
type: gauge
entity: sensor.tublemetry_hot_tub_temperature
name: Hot Tub
min: 32
max: 110
needle: true
segments:
  - from: 32
    color: blue
  - from: 99
    color: orange
  - from: 104
    color: red

---
# Card 2: Setpoint control + current temp
type: entities
title: Hot Tub
entities:
  - entity: sensor.tublemetry_hot_tub_temperature
    name: Water Temperature
  - entity: number.tublemetry_hot_tub_setpoint
    name: Setpoint

---
# Card 3: Thermodynamics -- temp vs setpoint vs outdoor air (72h)
type: history-graph
title: Hot Tub Thermodynamics
hours_to_show: 72
entities:
  - entity: sensor.tublemetry_hot_tub_temperature
    name: Water Temp
  - entity: number.tublemetry_hot_tub_setpoint
    name: Setpoint
  - entity: sensor.outdoor_temperature
    name: Outdoor Air

---
# Card 4: Short-term history (24h detail)
type: history-graph
title: Hot Tub (24h)
hours_to_show: 24
entities:
  - entity: sensor.tublemetry_hot_tub_temperature
    name: Water Temp
  - entity: number.tublemetry_hot_tub_setpoint
    name: Setpoint
  - entity: sensor.outdoor_temperature
    name: Outdoor Air

---
# Card 5: Diagnostics
type: entities
title: Hot Tub Diagnostics
entities:
  - entity: sensor.tublemetry_hot_tub_display_state
    name: Display State
  - entity: sensor.tublemetry_hot_tub_decode_confidence
    name: Decode Confidence
  - entity: sensor.tublemetry_hot_tub_last_update
    name: Last Update
  - entity: sensor.tublemetry_hot_tub_wifi_signal
    name: WiFi Signal

---
# Card 6: Status
type: entities
title: Hot Tub Status
entities:
  - entity: binary_sensor.tublemetry_hot_tub_heater
    name: Heater
  - entity: binary_sensor.tublemetry_hot_tub_pump
    name: Pump
  - entity: binary_sensor.tublemetry_hot_tub_light
    name: Light

---
# Card 7: Thermal model — preheat planning
# Requires ha/thermal_model.yaml to be configured in HA.
type: entities
title: Hot Tub Preheat
entities:
  - entity: sensor.hot_tub_preheat_eta
    name: Time to Setpoint
    icon: mdi:clock-outline
  - entity: sensor.hot_tub_preheat_minutes
    name: Preheat Minutes
  - entity: sensor.hot_tub_heating_rate
    name: Heating Rate
  - entity: sensor.hot_tub_cooling_rate
    name: Cooling Rate (°F/hr lost)
  - entity: sensor.outdoor_temperature
    name: Outdoor Temp
